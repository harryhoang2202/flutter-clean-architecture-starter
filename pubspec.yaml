name: flutter_clean_architecture_starter
description: A Flutter Clean Architecture reference starter for project and task management.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  go_router: ^17.3.0
  injectable: ^2.7.1
  intl: ^0.20.2
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^10.0.0
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  freezed: ^3.2.3
  injectable_generator: ^2.9.1
  json_serializable: ^6.11.2
  mocktail: ^1.0.5

flutter:
  generate: true
  uses-material-design: true
